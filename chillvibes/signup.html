<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup</title>
    <style>
        body{
            background-image: url("https://images.pexels.com/photos/768938/pexels-photo-768938.jpeg");
            background-size: cover;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body><br><br>
   <div style="text-align: center;"><img src="./image.png" alt="icon"></div><br><br>
   <form style="text-align:left; border: solid black; padding:20px; margin:auto; width: 350px;;"><br>
    <label for="first">FIRST NAME:</label>
    <input type="text" id="first" required><br><br>
    <label for="middle">MIDDLE NAME:</label>
    <input type="text" id="middle"><br><br>
    <label for="last">LAST NAME:</label>
    <input type="text" id="last" required><br><br>
    <label for="USERNAME">USERNAME:</label>
    <input type="text" name="USERNAME"><br><br>
    <label for="email">EMAIL:</label>
    <input type="email" id="email"><br><br>
    <label for="password">PASSWORD:</label>
    <input type="password" maxlength="8" id="password"><br><br>
    <label for="confirm"> CONFIRM PASSWORD:</label>
    <input type="password" id="confirm"> <br><br>
   </form><br><br>
   <div style="text-align: center;"><button style="background-color: rgb(14, 14, 14); color: white;">SIGNUP</button></div>
</html>
