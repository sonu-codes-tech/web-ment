<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup</title>
</head>
<body><br><br>
   <div style="text-align: center;"><img src="https://cdn-icons-png.flaticon.com/128/1177/1177577.png" alt="icon"></div><br><br>
   <form style="text-align: center; border: solid black;"><br>
    <label for="first">FIRST NAME:</label>
    <input type="text" id="first" required><br><br>
    <label for="middle">MIDDLE NAME:</label>
    <input type="text" id="middle"><br><br>
    <label for="last">LAST NAME:</label>
    <input type="text" id="last" required><br><br>
    <label for="USERNAME">USERNAME:</label>
    <input type="text" name="USERNAME"><br><br>
    <label for="email">EMAIL:</label>
    <input type="email" id="email"><br><br>
    <label for="password">PASSWORD:</label>
    <input type="password" maxlength="8" id="password"><br><br>
    <label for="confirm"> CONFIRM PASSWORD:</label>
    <input type="password" id="confirm"> <br><br>
   </form><br><br>
   <div style="text-align: center;"><button style="background-color: crimson;">SIGNUP</button></div>
</html>
