<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<body>
    <script>

        //Print Number 1 to 100
        // console.log(1)
        // console.log(2)  // .... 10 Times


         //Start Point and End Point go for For Loop 
         //1. for(start point; ending/condition ; increment/decrement)

         //Print Number 1 to 10

         for(let i = 1; i <=10;  i++ ){
            //Body of for Loop
            console.log(`The value is ${i}`)
         }

         
         //Rule : Condition is True Loops starts and COndition is False Loop Stop

         //while Loop - Entry Controlled Loop
        // while(condition)

         let count = 1

         while(count <=5){

            console.log("Hello While loop")
            count++
         }


         //Do While - It Runs Atleast for 1 time
         let number = 7
         do{
            alert("Hii I am a Notification - Pop up Msg")
         }while(number <= 5)



         







    </script>
</body>
</html>
