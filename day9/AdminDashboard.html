<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: grid;

            grid-template-columns: 250px 1fr;

            grid-template-rows: 80px  auto   80px;

            gap: 10px;

            border: 1px solid black;
        }

        header{
            grid-column: 1/3;
            /* starts with 1 and end before column 3 */
            background: #2563eb;
            padding: 20px;
        }

        aside{
            background: #ddd;
            padding: 20px;
        }

        main{
            background: aqua;
            padding: 20px;
        }

        footer{
            background: #333;
            color: white;
            grid-column: 1/3;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>Header</header>

        <aside>Sider Bar</aside>

        <main>
            Main Content
        </main>

        <footer>
            Footer
        </footer>

    </div>
</body>
</html>
