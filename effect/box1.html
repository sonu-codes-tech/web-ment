<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin:0;
        }
        body{
            background-color: dimgray;
            align-content: center;
            height: 100vh;
        }
        .box{
            text-align: center;
            border: 10px;
            width: 300px;
            height: 200px;
            border-radius: 10px;
            background-color: cornflowerblue;
            margin: 0 auto;
            padding: 30px;
            position: relative;
            
        }
        @property --angle{
            syntax: '<angle>';
                initial-value:0deg;
                inherits: false;

        }
        .box::after, .box::before{
            content: "";
            width: 100%;
            height: 100%;
            /* background: red; */
            background-image: conic-gradient(from var(--angle), #2b2b78, #4e5dcc, #580fec, #a83db455);
            position: absolute;
            left:50%;
            top:50%;
            z-index: -1;
            border-radius: 10px;
            translate: -50% -50%;
            animation: spin 3s linear infinite;
            padding: 5px;
            

        }
        .box::before{
            opacity: 0.5;
            filter: blur(1.5 rem);
            cursor: pointer;
        }
        @keyframes spin{
            from{
                --angle:0deg;
            }
            to{
                --angle:360deg;
            }
        }

    </style>
</head>
<body>
    <div class="box">
        <h1>BOX</h1>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ipsum consequuntur perferendis dolor expedita nihil aliquid cupiditate asperiores sed molestias. Non fugit labore, porro nisi nesciunt cum tempora? Incidunt, repellat perferendis.</p>
    </div>
</body>
</html>
