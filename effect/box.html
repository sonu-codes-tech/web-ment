<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }
        body{
            min-height: 100vh;
            color: white;
            background-color: rgb(201, 172, 172);
            align-content: center;
            
        }
        .box{
            width: 300px;
            height: 300px;
            text-align: center;
            padding: 2em;
            background: rgb(189, 33, 16);
            border: 10px;
            margin: 0 auto;
            position: relative;
            border-radius: 10px;
            /* z-index:1; */
            
        }
        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }
        .box::after , .box::before{
            content: "";
            width: 100%;
            height: 100%;
            position: absolute;
            inset: -4px;
            background-image: conic-gradient(from var(--angle), #2b2b78, #4e5dcc, #580fec, #a83db455);
            top:50%;
            left:50%;            
            translate: -50% -50%;
            padding:3px;
            border-radius: 10px;
            z-index: -1;
            animation: spin 3s linear infinite;


        }
        .box::before {
            filter: blur(1.5rem);
            opacity: 0.5;
        }
        @keyframes spin {
            from { --angle: 0deg; }
            to { --angle: 360deg; }
        }

    </style>
</head>
<body>
    <div class="box">
        <h1>Animation</h1>
        <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Earum sint commodi natus vitae assumenda suscipit iusto delectus debitis quia. Officiis molestias adipisci aliquid nemo, laborum ad dolorem inventore cupiditate voluptatibus.</p>
    </div>
</body>
</html>
